# Render (backend) + Supabase (PostgreSQL externo)
# 1. Crea proyecto en https://supabase.com y copia DATABASE_URL (Session pooler, puerto 5432)
# 2. En Render: New > Blueprint y pega DATABASE_URL en la variable al desplegar

services:
  - type: web
    name: ritmoflow-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn ritmoflow.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ritmoflow-api.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
